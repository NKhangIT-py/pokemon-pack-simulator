<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ascended Heroes Simulator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="topbar">

        <h1>
            Mega Evolution Ascended Heroes
        </h1>

        <div class="stats">

            <div class="stat-box">
                Packs:
                <span id="packCount">50</span>
            </div>

            <div class="stat-box">
                Collection:
                <span id="collectionCount">0</span>
            </div>

        </div>

    </div>

    <div class="main">

        <div class="fake-pack">
            ASCENDED HEROES
        </div>

        <button id="openBtn">
            OPEN PACK
        </button>

        <div id="pullText"></div>

        <div id="cardsArea"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
